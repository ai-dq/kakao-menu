name: Refresh Menu Board

on:
  workflow_dispatch: # 수동 백업 실행 버튼

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system fonts (Korean)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-nanum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: npx --yes playwright install --with-deps chromium

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Download menu images and publish
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          chmod +x send_kakao_menus.sh download_kakao_profile.sh
          bash send_kakao_menus.sh

      - name: Commit and push if changed
        run: |
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update menu site for $(date +%F)"
            git push
          fi
