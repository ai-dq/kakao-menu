<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오늘의 구내식당 메뉴</title>
    <meta
      name="description"
      content="매일 아침 자동 갱신되는 구내식당 메뉴 보드"
    />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Guro Digital Complex</p>
        <h1>구로디지털단지 구내식당 메뉴를 한눈에.</h1>
        <p class="hero-copy">
          매일 아침 10시, 카카오 채널에서 최신 메뉴 이미지를 자동으로 수집하여
          한 페이지에 모아 보여드립니다.
        </p>
        <div class="hero-meta">
          <span id="menu-date">
            <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Loading...
          </span>
          <span id="updated-at">
            <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Preparing...
          </span>
        </div>
      </header>

      <main>
        <section class="menu-grid" id="menu-grid" aria-live="polite"></section>

        <section class="map-section">
          <h2 class="map-heading">식당 위치</h2>
          <div class="map-container" id="map"></div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="footer-inner">
          <span>오늘의 구내식당 메뉴</span>
          <span class="footer-dot"></span>
          <span>평일 오전 10시 자동 갱신</span>
          <span class="footer-dot"></span>
          <span>Powered by GitHub Pages</span>
        </div>
      </footer>
    </div>

    <!-- Lightbox -->
    <div class="lightbox-overlay" id="lightbox">
      <button class="lightbox-close" aria-label="닫기">&times;</button>
      <img src="" alt="" />
      <div class="lightbox-title"></div>
    </div>

    <!-- Scroll to top -->
    <button class="scroll-top" id="scroll-top" aria-label="맨 위로">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <template id="menu-card-template">
      <article class="menu-card">
        <div class="image-frame">
          <img class="menu-image" alt="" loading="lazy" />
        </div>
        <div class="card-body">
          <div class="card-header">
            <p class="card-kicker">Menu Source</p>
            <h2 class="card-title"></h2>
          </div>
          <div class="card-actions">
            <a class="card-link card-link--naver" target="_blank" rel="noreferrer noopener">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              네이버 지도
            </a>
            <a class="card-link card-link--source" target="_blank" rel="noreferrer noopener">
              카카오 채널
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
            </a>
          </div>
        </div>
      </article>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
